name: Update scoreboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-scoreboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: worldcup-tronky
          auto-activate-base: false

      - name: Fetch results and score predictions
        shell: bash -el {0}
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_API_LEAGUE_ID: ${{ vars.FOOTBALL_API_LEAGUE_ID }}
          FOOTBALL_API_SEASON: "2026"
        run: |
          python scripts/fetch_results.py
          python scripts/score_predictions.py

      - name: Commit updated scoreboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json
          git diff --cached --quiet || git commit -m "Update scoreboard data"
          git push
